name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release-darwin:
    name: Release (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-latest
    needs: release-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build Linux binary
        run: |
          # Build linux/amd64 only (ARM64 cross-compile has CGO issues with DuckDB)
          CGO_ENABLED=1 go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -tags sqlite_omit_load_extension -o ccvault-linux-amd64 ./cmd/ccvault

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Create amd64 archive
          mkdir -p ccvault_${VERSION}_Linux_x86_64
          cp ccvault-linux-amd64 ccvault_${VERSION}_Linux_x86_64/ccvault
          cp README.md ccvault_${VERSION}_Linux_x86_64/ 2>/dev/null || true
          tar -czvf ccvault_${VERSION}_Linux_x86_64.tar.gz ccvault_${VERSION}_Linux_x86_64

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release upload ${GITHUB_REF_NAME} \
            ccvault_${VERSION}_Linux_x86_64.tar.gz \
            --clobber
